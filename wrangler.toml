# Cloudflare Pages কনফিগ — এই ফাইলটা repo-তে থাকলে Wrangler-ভিত্তিক ডিপ্লয়ে
# (এবং কিছু ক্ষেত্রে Git-integration বিল্ডেও) build output directory স্বয়ংক্রিয়ভাবে
# ঠিক জায়গা থেকে নেয়। তবে dashboard → Settings → Builds & deployments-এ
# "Build output directory" ফিল্ডটাও ম্যানুয়ালি "docs" সেট করে রাখা উচিত —
# Git-integration deploy-এ dashboard-এর সেটিংসই মূল সোর্স অফ ট্রুথ, এই ফাইলটা
# শুধু বাড়তি নিশ্চয়তা হিসেবে থাকল।
# নোট (নাম-বদল): নিচের name = "open-current-affairs" শুধু এই কনফিগ-ফাইলের ভেতরের
# আইডেন্টিফায়ার। Git-integration দিয়ে ডিপ্লয় করলে লাইভ সাইটের আসল URL
# (*.pages.dev সাবডোমেইন বা কাস্টম ডোমেইন) সাধারণত Cloudflare ড্যাশবোর্ডে
# Pages প্রজেক্ট প্রথমবার সেটআপ করার সময় ঠিক হয়ে যায় — এই ফাইল বদলালেই সেটা
# বদলাবে এমন নিশ্চয়তা নেই। URL-ও বদলাতে চাইলে ড্যাশবোর্ডে গিয়ে সরাসরি দেখতে হবে।
name = "open-current-affairs"
pages_build_output_dir = "docs"
compatibility_date = "2026-07-01"
