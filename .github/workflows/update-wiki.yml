name: Update wiki index

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build index
        run: python3 scripts/build_index.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/topics-index.json docs/recent-changes.json docs/sw.js docs/version.json docs/ghotonaprobaho-index.json
          git diff --cached --quiet || git commit -m "chore: rebuild generated site output [skip ci]"
          git push
